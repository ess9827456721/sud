{% extends "base.html" %}
{% block title %}Настройки{% endblock %}
{% block page_title %}Настройки{% endblock %}

{% block content %}

<div class="card" style="max-width:540px">
  <div class="card-header"><h2>⚙ Настройки приложения</h2></div>
  <div class="card-body">
    <form method="post" action="{{ url_for('settings') }}">

      <div class="form-group">
        <label class="form-label">Интервал автосинхронизации (часы)</label>
        <select name="sync_interval_hours" class="form-control">
          {% for h in ['1','2','4','8','24'] %}
            <option value="{{ h }}" {{ 'selected' if settings.sync_interval_hours == h }}>{{ h }} ч.</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer">
          <input type="checkbox" name="sync_on_startup"
                 {{ 'checked' if settings.sync_on_startup == '1' }}
                 style="width:16px;height:16px">
          <span>Синхронизировать при запуске</span>
        </label>
      </div>

      <div class="form-group" style="color:var(--text-muted);font-size:12px">
        Версия приложения: {{ settings.app_version }}
      </div>

      <button type="submit" class="btn btn-primary">💾 Сохранить</button>
    </form>
  </div>
</div>

{% endblock %}
