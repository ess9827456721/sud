# Cloud release build for Судебный Трекер.
# Run manually: Actions -> Release -> Run workflow (or push a v* tag).
#
# NOTE: the PyInstaller flags below MIRROR electron/build_electron.bat —
# if either file changes, update the other in the same commit.
name: Release

on:
  workflow_dispatch:        # manual button "Run workflow"
  push:
    tags: ['v*']            # or by pushing a version tag

permissions:
  contents: write            # allows creating releases with GITHUB_TOKEN

jobs:
  build:
    runs-on: windows-latest
    steps:
      # Action majors updated to the ones running on Node 24 (Node 20 on
      # GitHub Actions runners is deprecated).
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: playwright install chromium

      - name: Copy Playwright browsers into project
        shell: pwsh
        run: |
          $src = Join-Path $env:USERPROFILE 'AppData\Local\ms-playwright'
          Copy-Item $src playwright_browsers -Recurse

      - name: Generate icons
        run: python electron/create_icons.py

      # Flags mirrored from electron/build_electron.bat step [5/6]
      - name: PyInstaller bundle
        run: >
          pyinstaller --onedir --noconsole --noconfirm --name SudTracker_core
          --paths . --collect-submodules court_tracker
          --hidden-import court_tracker.app
          --add-data "court_tracker/templates;court_tracker/templates"
          --add-data "court_tracker/static;court_tracker/static"
          --add-data "playwright_browsers;playwright_browsers"
          --hidden-import flask --hidden-import playwright
          --hidden-import playwright.sync_api
          --collect-all rebrowser_playwright
          build/start.py

      # publish config (owner/repo/releaseType: release) comes from
      # electron/package.json — do NOT override it here
      - name: Electron build and publish
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm install
          npx electron-builder --publish always
